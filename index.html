<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆与脑智素养</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="deck" aria-label="记忆与脑智素养演示文稿">
    <!-- 新增页面时，复制一个 section.slide，并保持其在 .deck 内即可。 -->
    <section class="slide slide-title is-active" data-slide>
      <div class="slide-visual" aria-hidden="true">
        <div class="brain-orbit">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <div class="slide-content">
        <p class="eyebrow">Brain Literacy Course</p>
        <h1>记忆与脑智素养</h1>
        <p class="subtitle">面向中小学生的脑科学探究课程展示</p>
      </div>
    </section>

    <section class="slide" data-slide>
      <div class="slide-visual" aria-hidden="true">
        <div class="neural-map">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
      </div>
      <div class="slide-content">
        <p class="eyebrow">Question 01</p>
        <h2>为什么要学习记忆</h2>
        <p class="lead">记忆影响学习、理解、迁移与问题解决</p>
      </div>
    </section>

    <section class="slide" data-slide>
      <div class="slide-visual" aria-hidden="true">
        <div class="memory-lens">
          <span class="lens-core"></span>
          <span class="lens-ring"></span>
        </div>
      </div>
      <div class="slide-content">
        <p class="eyebrow">Concept 02</p>
        <h2>记忆不是照相机</h2>
        <p class="lead">记忆会受到容量、注意、干扰和策略的影响</p>
      </div>
    </section>

    <section class="slide" data-slide>
      <div class="slide-visual" aria-hidden="true">
        <div class="activity-grid">
          <span>容量</span>
          <span>追踪</span>
          <span>干扰</span>
          <span>策略</span>
        </div>
      </div>
      <div class="slide-content">
        <p class="eyebrow">Practice 03</p>
        <h2>课程活动设计</h2>
        <ul class="activity-list">
          <li>记忆容量调查</li>
          <li>工作记忆追踪</li>
          <li>遗忘元凶调查</li>
          <li>记忆策略破解</li>
        </ul>
      </div>
    </section>

    <section class="slide" data-slide>
      <div class="slide-visual" aria-hidden="true">
        <div class="summary-mark">
          <span></span>
        </div>
      </div>
      <div class="slide-content">
        <p class="eyebrow">Summary</p>
        <h2>总结</h2>
        <p class="lead">认识记忆规律，学会科学学习</p>
      </div>
    </section>
  </main>

  <div class="page-indicator" aria-live="polite">
    <span id="currentPage">01</span>
    <span class="page-divider">/</span>
    <span id="totalPages">05</span>
  </div>

  <div class="progress" aria-hidden="true">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
